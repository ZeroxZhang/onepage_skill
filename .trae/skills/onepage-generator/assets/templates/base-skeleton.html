<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OnePage</title>

    <!-- [FONT_IMPORT]: Replace with style-matched @import from typography.md -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap');
    </style>

    <style>
        /* ============================================
           BASE RESET & VARIABLES
           ============================================ */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* [COLORS]: Replace with values from design-styles.md */
            --color-bg: #ffffff;
            --color-surface: #f8f9fa;
            --color-primary: #2563eb;
            --color-accent: #7c3aed;
            --color-text: #334155;
            --color-text-secondary: #94a3b8;
            --color-border: #e2e8f0;

            /* [TYPOGRAPHY] */
            --font-heading: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            --font-body: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;

            /* [SPACING] */
            --page-padding: 48px;
            --section-gap: 40px;
            --card-radius: 12px;
        }

        /* ============================================
           PAGE CONTAINER
           [SIZE]: Adjust width/height per layout-specs.md
           ============================================ */
        .page {
            width: 800px;            /* A1: 800px | A2: 1920px | A3: 1080px */
            min-height: 100vh;       /* A1: auto  | A2: 1080px | A3: 1080px */
            margin: 0 auto;
            padding: var(--page-padding);
            background: var(--color-bg);
            font-family: var(--font-body);
            color: var(--color-text);
            font-size: 15px;
            line-height: 1.8;
            letter-spacing: 0.02em;
            position: relative;
            overflow: hidden;
        }

        /* ============================================
           DECORATIVE BACKGROUND ELEMENTS
           [STYLE]: Add per design-styles.md
           ============================================ */
        .page::before {
            content: '';
            position: absolute;
            top: -100px;
            right: -100px;
            width: 400px;
            height: 400px;
            /* Example: radial gradient blob */
            background: radial-gradient(circle, rgba(37,99,235,0.08) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        .page > * {
            position: relative;
            z-index: 1;
        }

        /* ============================================
           HEADER
           ============================================ */
        .header {
            text-align: center;
            margin-bottom: var(--section-gap);
            padding-bottom: 32px;
            border-bottom: 1px solid var(--color-border);
        }

        .header h1 {
            font-family: var(--font-heading);
            font-size: 36px;
            font-weight: 700;
            line-height: 1.3;
            color: var(--color-text);
            margin-bottom: 12px;
        }

        .header .subtitle {
            font-size: 16px;
            color: var(--color-text-secondary);
            font-weight: 400;
        }

        /* ============================================
           CONTENT SECTIONS
           ============================================ */
        .section {
            margin-bottom: var(--section-gap);
        }

        .section-title {
            font-family: var(--font-heading);
            font-size: 22px;
            font-weight: 700;
            color: var(--color-text);
            margin-bottom: 16px;
            padding-left: 12px;
            border-left: 3px solid var(--color-primary);
        }

        .section-body {
            font-size: 15px;
            line-height: 1.8;
        }

        /* ============================================
           CARD COMPONENT
           ============================================ */
        .card {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--card-radius);
            padding: 24px;
            margin-bottom: 16px;
        }

        /* ============================================
           GRID LAYOUTS
           ============================================ */
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 16px;
        }

        /* ============================================
           DIAGRAM CONTAINERS
           [DIAGRAMS]: Populate per diagram-guide.md
           ============================================ */
        .diagram-container {
            margin: 24px 0;
            padding: 24px;
            border-radius: var(--card-radius);
            background: var(--color-surface);
        }

        .diagram-title {
            font-size: 14px;
            font-weight: 500;
            color: var(--color-text-secondary);
            margin-bottom: 16px;
            text-align: center;
        }

        /* ============================================
           FOOTER
           ============================================ */
        .footer {
            margin-top: var(--section-gap);
            padding-top: 24px;
            border-top: 1px solid var(--color-border);
            text-align: center;
            font-size: 12px;
            color: var(--color-text-secondary);
        }
    </style>
</head>
<body>
    <div class="page">
        <!-- [HEADER] -->
        <div class="header">
            <h1><!-- [主标题] --></h1>
            <p class="subtitle"><!-- [副标题/摘要] --></p>
        </div>

        <!-- [CONTENT SECTIONS]: Repeat as needed -->
        <div class="section">
            <h2 class="section-title"><!-- [小标题] --></h2>
            <div class="section-body">
                <!-- [正文内容] -->
            </div>
        </div>

        <!-- [DIAGRAM]: Insert per diagram-guide.md -->
        <div class="diagram-container">
            <p class="diagram-title"><!-- [图表标题] --></p>
            <!-- [SVG/CSS 图表代码] -->
        </div>

        <!-- [FOOTER] -->
        <div class="footer">
            <!-- [来源/署名/日期] -->
        </div>
    </div>
</body>
</html>
